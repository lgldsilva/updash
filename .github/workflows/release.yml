name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.1). Required for manual dispatch.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  GORELEASER_VERSION: v2.13.0
  CYCLODEX_VERSION: v1.10.0

jobs:
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) echo "tag=$tag" >> "$GITHUB_OUTPUT" ;;
            *) echo "❌ Not a v* tag: $tag" >&2; exit 1 ;;
          esac

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve-tag
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -o updash ./cmd/updash/
      - name: Test with race detector
        run: go test -race ./...

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-test]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate SBOM
        run: |
          set -eu
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${{ env.CYCLODEX_VERSION }}
          # `cyclonedx-gomod mod` takes a single MODULE_PATH, not a glob.
          # For a single-module repo, the module root is the current dir.
          cyclonedx-gomod mod -json -output bom.json .
          test -s bom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

  release-artifacts:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-test, sbom]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@${{ env.GORELEASER_VERSION }}
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Clean up SBOM before GoReleaser
        run: rm -f bom.json
      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean --config goreleaser.github.yaml
      - name: Re-download SBOM for release attachment
        uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
