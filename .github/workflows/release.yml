name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.1). Required for manual dispatch.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/updash
  GORELEASER_VERSION: v2.13.0
  CYCLODEX_VERSION: v1.10.0
  TRIVY_VERSION: '0.58.1'

jobs:
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) echo "tag=$tag" >> "$GITHUB_OUTPUT" ;;
            *) echo "❌ Not a v* tag: $tag" >&2; exit 1 ;;
          esac

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve-tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -o updash ./cmd/updash/
      - name: Test with race detector
        run: go test -race ./...

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate SBOM
        run: |
          set -eu
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${{ env.CYCLODEX_VERSION }}
          cyclonedx-gomod mod -json -output bom.json ./...
          test -s bom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ needs.resolve-tag.outputs.tag }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install Trivy
        run: |
          set -uo pipefail
          case "$(uname -m)" in
            aarch64|arm64)  TRIVY_ARCH="Linux-ARM64" ;;
            x86_64|amd64)   TRIVY_ARCH="Linux-64bit" ;;
            *) echo "Unsupported: $(uname -m)"; exit 1 ;;
          esac
          curl -sSfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${{ env.TRIVY_VERSION }}/trivy_${{ env.TRIVY_VERSION }}_${TRIVY_ARCH}.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          sudo chmod +x /usr/local/bin/trivy
      - name: Trivy image scan (CRITICAL, fail on hit)
        run: |
          set -uo pipefail
          digest="${{ steps.build.outputs.digest }}"
          [ -n "$digest" ] || { echo "❌ no build digest" >&2; exit 1; }
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed --no-progress \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$digest"

  release-artifacts:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-test, sbom, image]
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@${{ env.GORELEASER_VERSION }}
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean --config goreleaser.github.yaml
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
