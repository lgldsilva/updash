name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: '1.26'
  COVER_PKGS: ./internal/model/... ./internal/config/... ./internal/sizefmt/... ./internal/cli/... ./internal/retention/...
  TEST_IO_PKGS: ./internal/scanner/... ./internal/tui/... ./internal/cleaner/...
  GOLANGCI_LINT_VERSION: v2.12.2
  TRIVY_VERSION: '0.58.1'
  GITLEAKS_VERSION: '8.30.1'
  GOSEC_VERSION: 'v2.27.1'
  GOVULNCHECK_VERSION: 'latest'

jobs:
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test I/O packages (race)
        run: go test -race -count=1 ${{ env.TEST_IO_PKGS }}
      - name: Test gate packages (race + cover)
        run: go test -race -count=1 -coverprofile=coverage.out ${{ env.COVER_PKGS }}
      - name: Coverage ≥90%
        run: |
          set -eu
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          min="${COVERAGE_MIN:-90}"
          echo "Coverage: ${pct}% (min ${min})"
          awk -v p="$pct" -v min="$min" 'BEGIN{ exit (p+0 < min+0) }' \
            || { echo "Coverage ${pct}% < ${min}%"; exit 1; }
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out

  lint:
    name: format + golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: gofmt
        run: |
          set -eu
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@${{ env.GOLANGCI_LINT_VERSION }}
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  security-govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: govulncheck
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  security-gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
      - name: Run gosec
        run: |
          set -eu
          gosec -exclude=G204,G306,G703,G118 -fmt sarif -out gosec-results.sarif ./...
      - name: Upload gosec results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif

  security-trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          set -uo pipefail
          case "$(uname -m)" in
            aarch64|arm64)  TRIVY_ARCH="Linux-ARM64" ;;
            x86_64|amd64)   TRIVY_ARCH="Linux-64bit" ;;
            armv7l|armv7)   TRIVY_ARCH="Linux-ARM"   ;;
            *) echo "Unsupported: $(uname -m)"; exit 1 ;;
          esac
          curl -sSfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${{ env.TRIVY_VERSION }}/trivy_${{ env.TRIVY_VERSION }}_${TRIVY_ARCH}.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          sudo chmod +x /usr/local/bin/trivy
          trivy --version
      - name: Trivy scan (CRITICAL + HIGH, fail on hit)
        run: |
          set -uo pipefail
          trivy fs --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress .
      - name: Trivy scan (informational SARIF)
        if: always()
        run: |
          set -uo pipefail
          trivy fs --format sarif --output trivy-fs-results.sarif --no-progress . || true
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -uo pipefail
          GL_ARCH="linux_x64"
          case "$(uname -m)" in
            aarch64|arm64) GL_ARCH="linux_arm64" ;;
          esac
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${GITLEAKS_VERSION#v}_${GL_ARCH}.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          sudo chmod +x /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks full history
        run: gitleaks detect --source . --no-banner --redact --log-opts=--all

  package:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.13.0
      - name: Validate config
        run: goreleaser check --config goreleaser.github.yaml
      - name: Snapshot build
        run: GOFLAGS=-mod=mod goreleaser release --snapshot --clean --config goreleaser.github.yaml --skip=publish

  ci-gate:
    name: PR gate (all jobs must pass)
    runs-on: ubuntu-latest
    needs: [test, lint, security-govulncheck, security-gosec, security-trivy-fs, secrets-scan, package]
    if: always()
    steps:
      - name: Verify all gates
        run: |
          set -eu
          failed=()
          for j in test lint security-govulncheck security-gosec security-trivy-fs secrets-scan package; do
            r="${{ needs[j].result }}"
            echo "  $j: $r"
            if [ "$r" != "success" ]; then
              failed+=("$j")
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "❌ Failed gates: ${failed[*]}"
            exit 1
          fi
          echo "✅ All gates green"
