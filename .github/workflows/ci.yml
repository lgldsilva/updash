name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GITLEAKS_VERSION: '8.30.1'
  GOSEC_VERSION: 'v2.27.1'
  GOVULNCHECK_VERSION: 'latest'
  TRIVY_VERSION: '0.72.0'
  GOLANGCI_LINT_VERSION: v2.12.2
  GOLANGCI_LINT_ACTION_VERSION: v9.3.0

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test ok"

  security-govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: govulncheck
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          set -eu
          curl -sSfL -o /tmp/gl.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          echo "downloaded"

  package:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.13.0
      - name: Validate config
        run: goreleaser check --config goreleaser.github.yaml
      - name: Snapshot build
        run: GOFLAGS=-mod=mod goreleaser release --snapshot --clean --config goreleaser.github.yaml --skip=publish
