name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test ok"

  ci-gate:
    name: PR gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - run: echo "test: ${{ needs.test.result }}"
