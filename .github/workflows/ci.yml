name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GO_VERSION: '1.26'
      COVER_PKGS: ./internal/model/... ./internal/config/... ./internal/sizefmt/... ./internal/cli/... ./internal/retention/...
      TEST_IO_PKGS: ./internal/scanner/... ./internal/tui/... ./internal/cleaner/...
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test I/O packages (race)
        run: go test -race -count=1 ${{ env.TEST_IO_PKGS }}
      - name: Test gate packages (race + cover)
        run: go test -race -count=1 -coverprofile=coverage.out ${{ env.COVER_PKGS }}



  lint:
    name: format + golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GO_VERSION: '1.26'
      GOLANGCI_LINT_VERSION: v2.12.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: gofmt
        run: |
          set -eu
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
  security-govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GOVULNCHECK_VERSION: 'latest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      - name: govulncheck
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLEAKS_VERSION: '8.30.1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          set -eu
          curl -sSfL -o /tmp/gl.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          tar xzf /tmp/gl.tgz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          sudo chmod +x /usr/local/bin/gitleaks
          gitleaks detect --source . --no-git --redact --verbose

  security-gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    env:
      GO_VERSION: '1.26'
      GOSEC_VERSION: 'v2.27.1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
      - name: Run gosec
        run: |
          set -eu
          gosec -exclude=G204,G306,G703,G118 -fmt sarif -out gosec-results.sarif ./...
      - name: Upload gosec results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif

  security-trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_VERSION: '0.72.0'
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          set -uo pipefail
          case "$(uname -m)" in
            aarch64|arm64)  TRIVY_ARCH="Linux-ARM64" ;;
            x86_64|amd64)   TRIVY_ARCH="Linux-64bit" ;;
            armv7l|armv7)   TRIVY_ARCH="Linux-ARM"   ;;
            *) echo "Unsupported: $(uname -m)"; exit 1 ;;
          esac
          curl -sSfL             "https://github.com/aquasecurity/trivy/releases/download/v${{ env.TRIVY_VERSION }}/trivy_${{ env.TRIVY_VERSION }}_${TRIVY_ARCH}.tar.gz"             -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          sudo chmod +x /usr/local/bin/trivy
          trivy --version
      - name: Trivy scan (CRITICAL + HIGH, fail on hit)
        run: |
          set -uo pipefail
          trivy fs --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress .
      - name: Trivy scan (informational SARIF)
        if: always()
        run: |
          set -uo pipefail
          trivy fs --format sarif --output trivy-fs-results.sarif --no-progress . || true
      - name: Upload Trivy results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

  package:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GO_VERSION: '1.26'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.13.0
      - name: Validate config
        run: goreleaser check --config goreleaser.github.yaml
      - name: Snapshot build
        run: GOFLAGS=-mod=mod goreleaser release --snapshot --clean --config goreleaser.github.yaml --skip=publish
  ci-gate:
    name: PR gate
    runs-on: ubuntu-latest
    needs: [test, lint, security-gosec, security-trivy-fs, package]
    if: always()
    steps:
      - name: Verify
        run: |
          set -eu
          r="${{ needs.test.result }}"
          echo "test: $r"
          [ "$r" = "success" ]
