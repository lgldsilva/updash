name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GITLEAKS_VERSION: '8.30.1'
  GOSEC_VERSION: 'v2.27.1'
  GOVULNCHECK_VERSION: 'latest'
  TRIVY_VERSION: '0.72.0'
  GOLANGCI_LINT_VERSION: v2.12.2
  GOLANGCI_LINT_ACTION_VERSION: v9.3.0

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test ok"

  security-govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: govulncheck
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          set -eu
          curl -sSfL -o /tmp/gl.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          echo "downloaded"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: gofmt
        run: |
          set -eu
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  security-gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
      - name: Run gosec
        run: |
          set -eu
          gosec -exclude=G204,G306,G703,G118 -fmt sarif -out gosec-results.sarif ./...
      - name: Upload gosec results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
