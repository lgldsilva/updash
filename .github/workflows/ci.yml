name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GO_VERSION: '1.26'
      COVER_PKGS: ./internal/model/... ./internal/config/... ./internal/sizefmt/... ./internal/cli/... ./internal/retention/...
      TEST_IO_PKGS: ./internal/scanner/... ./internal/tui/... ./internal/cleaner/...
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test I/O packages (race)
        run: go test -race -count=1 ${{ env.TEST_IO_PKGS }}
      - name: Test gate packages (race + cover)
        run: go test -race -count=1 -coverprofile=coverage.out ${{ env.COVER_PKGS }}



  lint:
    name: format + golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GO_VERSION: '1.26'
      GOLANGCI_LINT_VERSION: v2.12.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: gofmt
        run: |
          set -eu
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
  security-govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GOVULNCHECK_VERSION: 'latest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      - name: govulncheck
        run: |
          set -eu
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLEAKS_VERSION: '8.30.1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          set -eu
          curl -sSfL -o /tmp/gl.tgz             "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          echo "downloaded"
  ci-gate:
    name: PR gate
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()
    steps:
      - name: Verify
        run: |
          set -eu
          r="${{ needs.test.result }}"
          echo "test: $r"
          [ "$r" = "success" ]
