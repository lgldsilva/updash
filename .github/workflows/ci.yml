name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GO_VERSION: '1.26'
      COVER_PKGS: ./internal/model/... ./internal/config/... ./internal/sizefmt/... ./internal/cli/... ./internal/retention/...
      TEST_IO_PKGS: ./internal/scanner/... ./internal/tui/... ./internal/cleaner/...
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test I/O packages (race)
        run: go test -race -count=1 ${{ env.TEST_IO_PKGS }}
      - name: Test gate packages (race + cover)
        run: go test -race -count=1 -coverprofile=coverage.out ${{ env.COVER_PKGS }}

  ci-gate:
    name: PR gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Verify
        run: |
          set -eu
          r="${{ needs.test.result }}"
          echo "test: $r"
          [ "$r" = "success" ]
