name: updash
base: core24
version: git
summary: System Update Dashboard
description: |
  updash scans and updates host package managers, AI tooling, and cleanup
  candidates. It requires classic confinement because its purpose is to invoke
  the package managers installed on the host system.
grade: stable
confinement: classic

platforms:
  amd64:
  arm64:

apps:
  updash:
    command: bin/updash

parts:
  updash:
    plugin: go
    source: ../..
    build-snaps:
      - go/1.26/stable
    build-environment:
      - CGO_ENABLED: "0"
    override-build: |
      go build -trimpath -ldflags="-s -w -X main.version=${CRAFT_PROJECT_VERSION}" \
        -o "$CRAFT_PART_INSTALL/bin/updash" ./cmd/updash
